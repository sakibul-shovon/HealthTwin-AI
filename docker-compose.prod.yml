services:

  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: healthtwin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend (Kokoro TTS baked in) ───────────────────────────────────
  backend:
    build: ./backend
    restart: always
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@db:5432/healthtwin
      GROQ_API_KEY: ${GROQ_API_KEY}
      # Update ALLOWED_ORIGINS to include your VPS IP or Domain name
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-'["*"]'}
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    # We remove the volume mount and the --reload flag for production
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 1

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    environment:
      DOCKER_BUILD: "1"
      BACKEND_URL: http://backend:8000
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
