services:

  # ── PostgreSQL + pgvector ───────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: healthtwin
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── FastAPI backend (Kokoro TTS baked in) ───────────────────────────────────
  backend:
    build: ./backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/healthtwin
      GROQ_API_KEY: ${GROQ_API_KEY}
      ALLOWED_ORIGINS: '["http://localhost:3000","http://127.0.0.1:3000"]'
      DEBUG: "false"
    depends_on:
      db:
        condition: service_healthy
    # Mount source for live reload during dev (model stays inside image at site-packages)
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ── Next.js frontend ────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
      # Set DOCKER_BUILD=1 so next.config.mjs enables standalone output
    environment:
      DOCKER_BUILD: "1"
      BACKEND_URL: http://backend:8000
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  pgdata:
