name: Deploy to VPS

on:
  push:
    branches:
      - main # Or master, depending on your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            cd ~/healthtwin-ai || (git clone https://oauth2:$GITHUB_TOKEN@github.com/${{ github.repository }}.git ~/healthtwin-ai && cd ~/healthtwin-ai)
            git config --global --add safe.directory ~/healthtwin-ai
            git remote set-url origin https://oauth2:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
            git pull origin main
            
            # Export the Groq key to a local .env for docker-compose to use
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" > .env
            
            # Rebuild and restart containers in detached mode
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Optional: Clean up old, unused images to save space
            docker image prune -f
