name: Deploy to VPS

on:
  push:
    branches:
      - main # Or master, depending on your default branch name

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          envs: GITHUB_TOKEN
          script: |
            set -e
            cd ~/healthtwin-ai || (git clone https://oauth2:$GITHUB_TOKEN@github.com/${{ github.repository }}.git ~/healthtwin-ai && cd ~/healthtwin-ai)
            git config --global --add safe.directory ~/healthtwin-ai
            git remote set-url origin https://oauth2:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
            git fetch origin main
            git reset --hard origin/main
            
            # Safely create or append to .env without overwriting existing manual entries
            touch .env
            # Remove old GROQ_API_KEY and POSTGRES_PASSWORD if they exist to update them
            sed -i '/^GROQ_API_KEY=/d' .env
            sed -i '/^POSTGRES_PASSWORD=/d' .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            if [ -n "${{ secrets.POSTGRES_PASSWORD }}" ]; then
              echo "POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}" >> .env
            fi
            
            # Rebuild and restart containers in detached mode
            docker compose -f docker-compose.prod.yml up -d --build
            
            # Optional: Clean up old, unused images to save space
            docker image prune -f
