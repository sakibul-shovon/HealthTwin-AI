name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          timeout: 30m
          envs: GITHUB_TOKEN
          script: |
            set -e
            cd ~/healthtwin-ai || (git clone https://oauth2:$GITHUB_TOKEN@github.com/${{ github.repository }}.git ~/healthtwin-ai && cd ~/healthtwin-ai)
            git config --global --add safe.directory ~/healthtwin-ai
            git remote set-url origin https://oauth2:$GITHUB_TOKEN@github.com/${{ github.repository }}.git
            git fetch origin main
            git reset --hard origin/main

            # ── .env: update secrets without touching other manual entries ──
            touch .env
            sed -i '/^GROQ_API_KEY=/d' .env
            sed -i '/^GROQ_API_KEYS=/d' .env
            sed -i '/^POSTGRES_PASSWORD=/d' .env
            sed -i '/^DATABASE_URL=/d' .env
            echo "GROQ_API_KEY=${{ secrets.GROQ_API_KEY }}" >> .env
            if [ -n "${{ secrets.GROQ_API_KEYS }}" ]; then
              echo "GROQ_API_KEYS=${{ secrets.GROQ_API_KEYS }}" >> .env
            fi
            if [ -n "${{ secrets.POSTGRES_PASSWORD }}" ]; then
              PG_PASS="${{ secrets.POSTGRES_PASSWORD }}"
            else
              PG_PASS="postgres"
            fi
            echo "POSTGRES_PASSWORD=$PG_PASS" >> .env
            echo "DATABASE_URL=postgresql://postgres:$PG_PASS@db:5432/healthtwin" >> .env

            # ── Rebuild and start ──
            docker compose -f docker-compose.prod.yml up -d --build

            # ── Sync DB password: run as OS postgres user to bypass login restriction ──
            sleep 8
            docker compose -f docker-compose.prod.yml exec -T -u postgres db \
              psql -c "ALTER USER postgres WITH LOGIN PASSWORD '$PG_PASS';" || true

            # ── Health check: use Python (no curl in slim image) ──
            echo "Waiting for backend health check..."
            for i in $(seq 1 12); do
              STATUS=$(docker compose -f docker-compose.prod.yml exec -T backend \
                python -c "import urllib.request; r=urllib.request.urlopen('http://localhost:8000/health',timeout=4); print(r.getcode())" \
                2>/dev/null || echo "000")
              STATUS=$(echo "$STATUS" | tr -d '[:space:]')
              if [ "$STATUS" = "200" ]; then
                echo "Backend is healthy (attempt $i)"
                break
              fi
              echo "Attempt $i: not ready (status=$STATUS), retrying in 5s..."
              sleep 5
            done

            # ── Print logs and fail if backend never became healthy ──
            if [ "$STATUS" != "200" ]; then
              echo "ERROR: Backend failed health check. Last 80 log lines:"
              docker compose -f docker-compose.prod.yml logs backend --tail=80
              exit 1
            fi

            # ── Cleanup old images ──
            docker image prune -f
